<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Acesso demonstrativo a Plataforma Digital Raizes e Saberes." />
    <meta name="theme-color" content="#06462f" />
    <title>Acesso a Plataforma | Raizes e Saberes</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="logo-app.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel" aria-labelledby="login-title">
        <a class="login-brand" href="index.html" aria-label="Raizes e Saberes">
          <img src="logo-premium-dark.png" alt="Raizes e Saberes Ecossistema Educacional" onerror="this.hidden=true; this.nextElementSibling.hidden=false;" />
          <span hidden>Raizes e Saberes</span>
        </a>

        <div class="login-copy">
          <p>Ambiente Demonstrativo</p>
          <h1 id="login-title">Acesso restrito a Plataforma Digital</h1>
          <span>Entre com as credenciais autorizadas para visualizar a biblioteca, livros digitais e paineis do ecossistema.</span>
        </div>

        <form class="login-form" data-login-form novalidate>
          <label>
            <span>E-mail</span>
            <input type="email" name="email" autocomplete="username" placeholder="demo@raizesesaberes.com.br" required />
          </label>
          <label>
            <span>Senha</span>
            <input type="password" name="password" autocomplete="current-password" placeholder="Digite sua senha" required />
          </label>
          <p class="login-error" data-login-error role="alert" hidden>Credenciais invalidas para este ambiente.</p>
          <button type="submit">Acessar Plataforma</button>
        </form>

        <a class="login-back" href="index.html">Voltar ao Site</a>
      </section>
    </main>
    <script src="login.js?v=auth-login"></script>
  </body>
</html>
